# ─────────────────────────────────────────────────────────────────────────────
# Airship KPI Monitor — OPTIONAL bulk MCP generator secrets
#
# You only need this file if you use scripts/generate_mcp_config.py to create
# many Airship MCP entries in ~/.cursor/mcp.json at once (from-scratch setup).
#
# If your Airship MCP servers are ALREADY configured in Cursor, ignore this
# file entirely — credentials live in ~/.cursor/mcp.json and nowhere else.
#
# Usage:
#   1. cp clients.secrets.example.yml clients.secrets.yml   (gitignored)
#   2. Set `airship_mcp_dir` and paste OAuth creds for the clients you manage.
#   3. uv run --with pyyaml scripts/generate_mcp_config.py
#
# SECURITY: clients.secrets.yml is gitignored. Never commit it, never share it.
# ─────────────────────────────────────────────────────────────────────────────

settings:
  # Absolute local path to the airship-mcp package (the directory `uv run`
  # launches). Ask your team lead for the package if you don't have it.
  airship_mcp_dir: /absolute/path/to/airship-mcp

  # Default region applied when a client entry below omits `region`.
  # Per-client `region` (here or in clients.yml) takes precedence.
  default_region: eu

# Per-client OAuth credentials, keyed by the MCP server name WITHOUT the
# `user-` prefix (i.e. the key as it appears in ~/.cursor/mcp.json).
# Example: clients.yml `airship_mcp: user-HM PROD`  →  key here is `HM PROD`.
secrets:
  "HM PROD":
    app_key: xxxxxxxxxxxxxxxxxxxxxx
    client_id: xxxxxxxxxxxxxxxxxxxxxx
    client_secret: xxxxxxxxxxxxxxxxxxxxxx
    region: eu          # optional; overrides settings.default_region

  # "M6 PROD":
  #   app_key: xxxxxxxxxxxxxxxxxxxxxx
  #   client_id: xxxxxxxxxxxxxxxxxxxxxx
  #   client_secret: xxxxxxxxxxxxxxxxxxxxxx
  #   region: eu

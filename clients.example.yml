# ─────────────────────────────────────────────────────────────────────────────
# Airship KPI Monitor — client registry TEMPLATE (ROUTING ONLY — NO SECRETS)
#
# ▶ This is a TEMPLATE committed to the repo. Do NOT put real client data here.
#   Copy it to a LOCAL, gitignored `clients.yml` and fill in your own clients:
#
#       cp clients.example.yml clients.yml
#
#   `clients.yml` is gitignored — your client list stays on your machine and is
#   never pushed. The repo only ships the skill + this template.
#
# IMPORTANT — credentials are NOT stored here.
#   OAuth credentials (app key / client id / client secret) live ONLY in your
#   local Cursor MCP config (~/.cursor/mcp.json), configured once per client
#   (see MODOP.md §1.5). This file only routes the skill to an already-configured
#   MCP server (`airship_mcp`) and a Slack channel.
#
# How to launch (in Cursor chat, with the relevant MCP servers enabled):
#   • All clients:        "Run airship-kpi-monitor for all clients in clients.yml"
#   • A subset:           "Run airship-kpi-monitor for Client A and Client B"
#   • A single client:    "Run airship-kpi-monitor for Client A"
#
# The agent reads your local `clients.yml`, then runs the full daily workflow
# (SKILL.md Steps 0–11) once per selected client, using that client's params.
#
# Precedence: if a parameter is also given directly in the chat prompt, the
# prompt value wins for that run (lets you override a channel/threshold ad hoc).
# ─────────────────────────────────────────────────────────────────────────────

# Slack canvas link defaults (used to build clickable canvas URLs in alerts).
# Override only if your Slack channels live on a different workspace.
slack_workspace: urbanairship       # subdomain in https://<workspace>.slack.com
slack_team_id: T025Q1VP7            # team ID segment in the canvas URL path

# Field reference (per client):
#   name             (required) Client name shown in Slack/canvas headers.
#   brand_name       (optional) Public-facing brand for web searches in root
#                               cause analysis. Defaults to `name`.
#   airship_mcp      (required) Exact Cursor MCP server identifier of an MCP
#                               ALREADY configured in ~/.cursor/mcp.json
#                               (prefixed with `user-` for user MCP servers).
#   slack_channel_id (required) Target Slack channel ID (starts with C).
#   slack_canvas_id  (optional) Canvas ID. Leave blank on first run — the skill
#                               creates the canvas and prints the new ID to copy
#                               back here.
#   region           (optional) Airship region, `eu` or `us`. Informational
#                               here (the real region is set on the MCP server);
#                               also consumed by the optional MCP generator.
#   alert_language   (optional) Language for Slack alerts. Defaults to `en`.
#   enabled          (optional) Set to false to skip in "all clients" runs.
#                               Defaults to true.
#   custom_thresholds(optional) Per-client overrides of SKILL.md defaults.
# ─────────────────────────────────────────────────────────────────────────────

clients:
  # ── Example entries. Copy this file to clients.yml, then fill in your own. ───
  # - name: Client A
  #   brand_name: Client A Brand Name
  #   airship_mcp: user-CLIENT-A PROD
  #   slack_channel_id: C0XXXXXXXX
  #   slack_canvas_id: F0XXXXXXXX    # leave blank on first run
  #   region: eu
  #   alert_language: fr
  #   enabled: true
  #   # custom_thresholds:
  #   #   push_sends_drop_pct: 40
  #
  # - name: Client B
  #   brand_name: Client B Brand Name
  #   airship_mcp: user-CLIENT-B PROD
  #   slack_channel_id: C0YYYYYYYY
  #   slack_canvas_id: F0YYYYYYYY
  #   region: eu
  #   alert_language: fr
  #   enabled: false
  #   custom_thresholds:
  #     email_bounce_max: 3
